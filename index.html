<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hoài Thương · Louisa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #161310;
      --surface2: #1e1a16;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.15);
      --text: #e8e0d4;
      --muted: #7a7060;
      --accent: #e8c48a;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      cursor: default;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.7rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      animation: fadeDown 1s ease both;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -2px;
      animation: fadeDown 1s ease 0.15s both;
    }

    .hero-name em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-sub {
      margin-top: 28px;
      font-size: 0.85rem;
      font-weight: 200;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeDown 1s ease 0.3s both;
    }

    /* SOCIAL LINKS */
    .social-row {
      display: flex;
      gap: 24px;
      margin-top: 48px;
      animation: fadeDown 1s ease 0.45s both;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.3s;
      padding: 10px 0;
      border-bottom: 1px solid transparent;
    }

    .social-link:hover {
      color: var(--gold);
      border-bottom-color: var(--gold-dim);
    }

    .social-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: fadeDown 1s ease 0.7s both;
    }

    .scroll-hint::after {
      content: '';
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      animation: scrollLine 2s ease-in-out infinite;
    }

    @keyframes scrollLine {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.2); }
    }

    /* ── MAIN CONTENT ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 120px;
    }

    /* ── SECTION BUILDER ── */
    .builder {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 32px;
      margin-bottom: 60px;
      position: sticky;
      top: 20px;
      z-index: 10;
    }

    .builder-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--gold);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .type-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .type-tab {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 1px;
      transition: all 0.2s;
    }

    .type-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .type-tab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

    .builder-fields { display: none; }
    .builder-fields.active { display: flex; flex-direction: column; gap: 12px; }

    .field-row { display: flex; gap: 10px; flex-wrap: wrap; }

    input[type=text], input[type=url], textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 1px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input[type=text]:focus, input[type=url]:focus, textarea:focus {
      border-color: rgba(201,169,110,0.4);
    }

    input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.6; }

    .btn-publish {
      align-self: flex-end;
      padding: 12px 28px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 1px;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-publish:hover { opacity: 0.85; }
    .btn-publish:active { transform: scale(0.98); }

    /* ── POSTS ── */
    #feed { display: flex; flex-direction: column; gap: 48px; }

    .post-block {
      animation: fadeUp 0.6s ease both;
      position: relative;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .post-date {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .post-type-badge {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .delete-post {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      letter-spacing: 1px;
      padding: 4px 8px;
      transition: color 0.2s;
      font-family: 'Jost', sans-serif;
    }

    .delete-post:hover { color: #c0392b; }

    /* TEXT BLOCK */
    .block-text .content {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      line-height: 1.8;
      font-weight: 300;
      color: var(--text);
      border-left: 1px solid var(--gold-dim);
      padding-left: 24px;
    }

    .block-text .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 400;
      margin-bottom: 12px;
      color: var(--accent);
    }

    /* IMAGE BLOCK */
    .block-image img {
      width: 100%;
      display: block;
      border-radius: 1px;
      object-fit: cover;
    }

    .block-image .caption {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.5px;
    }

    /* VIDEO BLOCK */
    .block-video .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 1px;
    }

    .block-video .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .block-video .caption {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    /* INSTAGRAM BLOCK */
    .block-instagram .ig-wrap {
      display: flex;
      justify-content: center;
    }

    .instagram-media {
      border-radius: 1px !important;
      min-width: unset !important;
      width: 100% !important;
      max-width: 540px !important;
    }

    /* DIVIDER */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 8px 0;
    }

    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-divider span {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* EMPTY */
    .feed-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .feed-empty p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .feed-empty small { font-size: 0.75rem; letter-spacing: 1px; opacity: 0.5; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 9999;
      border-left: 2px solid var(--gold);
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .builder { padding: 20px; position: static; }
      .hero-name { letter-spacing: -1px; }
      .social-row { gap: 16px; flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- ── HERO ── -->

  <p class="hero-eyebrow">Personal Space</p>
  <h1 class="hero-name">Hoài<br/><em>Thương</em></h1>
  <p class="hero-sub">Louisa &nbsp;·&nbsp; Life · Moments · Stories</p>

  <div class="social-row">

  <div class="scroll-hint">scroll</div>
</section>

<!-- ── MAIN ── -->
<main>

  <!-- BUILDER -->
  <div class="builder">
    <div class="builder-title">✦ Thêm nội dung mới</div>

    <div class="type-tabs">
      <button class="type-tab active" onclick="switchTab('text')">✍ Text</button>
      <button class="type-tab" onclick="switchTab('image')">🖼 Ảnh</button>
      <button class="type-tab" onclick="switchTab('video')">▶ Video</button>
      <button class="type-tab" onclick="switchTab('instagram')">📸 Instagram</button>
    </div>

    <!-- TEXT -->
    <div class="builder-fields active" id="fields-text">
      <input type="text" id="text-title" placeholder="Tiêu đề (tuỳ chọn)"/>
      <textarea id="text-body" rows="4" placeholder="Viết gì đó..."></textarea>
      <button class="btn-publish" onclick="publish('text')">Đăng →</button>
    </div>

    <!-- IMAGE -->
    <div class="builder-fields" id="fields-image">
      <input type="url" id="img-url" placeholder="Link ảnh — https://..."/>
      <input type="text" id="img-caption" placeholder="Caption (tuỳ chọn)"/>
      <button class="btn-publish" onclick="publish('image')">Đăng →</button>
    </div>

    <!-- VIDEO -->
    <div class="builder-fields" id="fields-video">
      <input type="url" id="vid-url" placeholder="Link YouTube hoặc Vimeo"/>
      <input type="text" id="vid-caption" placeholder="Caption (tuỳ chọn)"/>
      <button class="btn-publish" onclick="publish('video')">Đăng →</button>
    </div>

    <!-- INSTAGRAM -->
    <div class="builder-fields" id="fields-instagram">
      <input type="url" id="ig-url" placeholder="Link bài đăng Instagram — https://www.instagram.com/p/..."/>
      <input type="text" id="ig-caption" placeholder="Caption (tuỳ chọn)"/>
      <button class="btn-publish" onclick="publish('instagram')">Đăng →</button>
    </div>
  </div>

  <!-- FEED -->
  <div id="feed">
    <div class="feed-empty">
      <p>Trang này đang trống...</p>
      <small>Dùng form phía trên để thêm nội dung đầu tiên ✦</small>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script async src="//www.instagram.com/embed.js"></script>
<script>
  let posts = JSON.parse(localStorage.getItem('louisa_blog') || '[]');
  let activeTab = 'text';

  function switchTab(type) {
    activeTab = type;
    document.querySelectorAll('.type-tab').forEach((t,i) => {
      t.classList.toggle('active', ['text','image','video','instagram'][i] === type);
    });
    document.querySelectorAll('.builder-fields').forEach(f => f.classList.remove('active'));
    document.getElementById('fields-' + type).classList.add('active');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function getYoutubeId(url) {
    const m = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/watch\?.+&v=))([^"&?\/\s]{11})/);
    return m ? m[1] : null;
  }

  function getVimeoId(url) {
    const m = url.match(/vimeo\.com\/(\d+)/);
    return m ? m[1] : null;
  }

  function getIGUrl(input) {
    const m = input.match(/instagram\.com\/(p|reel)\/([A-Za-z0-9_-]+)/);
    return m ? `https://www.instagram.com/${m[1]}/${m[2]}/` : null;
  }

  function publish(type) {
    let post = { type, id: Date.now(), date: new Date().toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' }) };

    if (type === 'text') {
      const title = document.getElementById('text-title').value.trim();
      const body  = document.getElementById('text-body').value.trim();
      if (!body) { toast('Hãy viết gì đó!'); return; }
      post.title = title; post.body = body;
      document.getElementById('text-title').value = '';
      document.getElementById('text-body').value = '';
    }

    if (type === 'image') {
      const url = document.getElementById('img-url').value.trim();
      if (!url) { toast('Nhập link ảnh nhé!'); return; }
      post.url = url;
      post.caption = document.getElementById('img-caption').value.trim();
      document.getElementById('img-url').value = '';
      document.getElementById('img-caption').value = '';
    }

    if (type === 'video') {
      const url = document.getElementById('vid-url').value.trim();
      if (!url) { toast('Nhập link video nhé!'); return; }
      const ytId = getYoutubeId(url);
      const vmId = getVimeoId(url);
      if (!ytId && !vmId) { toast('Chỉ hỗ trợ YouTube và Vimeo!'); return; }
      post.embedUrl = ytId
        ? `https://www.youtube.com/embed/${ytId}`
        : `https://player.vimeo.com/video/${vmId}`;
      post.caption = document.getElementById('vid-caption').value.trim();
      document.getElementById('vid-url').value = '';
      document.getElementById('vid-caption').value = '';
    }

    if (type === 'instagram') {
      const raw = document.getElementById('ig-url').value.trim();
      const url = getIGUrl(raw);
      if (!url) { toast('Link Instagram không hợp lệ!'); return; }
      post.url = url;
      post.caption = document.getElementById('ig-caption').value.trim();
      document.getElementById('ig-url').value = '';
      document.getElementById('ig-caption').value = '';
    }

    posts.unshift(post);
    localStorage.setItem('louisa_blog', JSON.stringify(posts));
    render();
    toast('Đã đăng ✓');
    setTimeout(() => { if (window.instgrm) window.instgrm.Embeds.process(); }, 500);
  }

  function deletePost(id) {
    posts = posts.filter(p => p.id !== id);
    localStorage.setItem('louisa_blog', JSON.stringify(posts));
    render();
    toast('Đã xoá');
  }

  function typeLabel(t) {
    return { text:'Text', image:'Ảnh', video:'Video', instagram:'Instagram' }[t] || t;
  }

  function renderBlock(p, i) {
    const meta = `
      <div class="post-meta">
        <span class="post-date">${p.date}</span>
        <span style="display:flex;align-items:center;gap:12px;">
          <span class="post-type-badge">${typeLabel(p.type)}</span>
          <button class="delete-post" onclick="deletePost(${p.id})">× xoá</button>
        </span>
      </div>`;

    if (p.type === 'text') return `
      <div class="post-block block-text" style="animation-delay:${i*0.07}s">
        ${meta}
        <div class="content">
          ${p.title ? `<div class="title">${p.title}</div>` : ''}
          <p>${p.body.replace(/\n/g,'<br/>')}</p>
        </div>
      </div>`;

    if (p.type === 'image') return `
      <div class="post-block block-image" style="animation-delay:${i*0.07}s">
        ${meta}
        <img src="${p.url}" alt="${p.caption||''}" loading="lazy"/>
        ${p.caption ? `<div class="caption">${p.caption}</div>` : ''}
      </div>`;

    if (p.type === 'video') return `
      <div class="post-block block-video" style="animation-delay:${i*0.07}s">
        ${meta}
        <div class="video-wrap">
          <iframe src="${p.embedUrl}" allowfullscreen loading="lazy"></iframe>
        </div>
        ${p.caption ? `<div class="caption">${p.caption}</div>` : ''}
      </div>`;

    if (p.type === 'instagram') return `
      <div class="post-block block-instagram" style="animation-delay:${i*0.07}s">
        ${meta}
        <div class="ig-wrap">
          <blockquote class="instagram-media" data-instgrm-permalink="${p.url}" data-instgrm-version="14" style="width:100%;max-width:540px;"></blockquote>
        </div>
        ${p.caption ? `<div style="margin-top:12px;font-style:italic;font-family:'Cormorant Garamond',serif;color:var(--muted);font-size:0.85rem;">${p.caption}</div>` : ''}
      </div>`;

    return '';
  }

  function render() {
    const feed = document.getElementById('feed');
    if (posts.length === 0) {
      feed.innerHTML = `<div class="feed-empty"><p>Trang này đang trống...</p><small>Dùng form phía trên để thêm nội dung đầu tiên ✦</small></div>`;
      return;
    }
    feed.innerHTML = posts.map((p, i) =>
      (i > 0 ? `<div class="section-divider"><span>✦</span></div>` : '') + renderBlock(p, i)
    ).join('');
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') publish(activeTab);
  });

  render();
</script>
</body>
</html>
